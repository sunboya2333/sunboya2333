<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun Boya | Portfolio</title>
    <style>
        /* 基础样式设置 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; /* 防止整页滚动 */
            background-color: #fcfcf9; /* 模仿纸张颜色 */
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 第一列：固定不动 */
        .column-fixed {
            flex: 0 0 250px;
            padding: 40px 20px;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* 第二、三列：独立滚动 */
        .column-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 30px;
            border-right: 1px solid #ddd;
        }

        h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        /* 文章卡片样式 */
        .article-card { margin-bottom: 50px; }
        .article-card img { width: 100%; height: auto; background: #eee; margin-bottom: 15px; }
        .article-card h3 { margin: 10px 0; font-size: 1.4rem; }
        .article-card p { color: #555; line-height: 1.6; }
        .lang-tag { font-size: 0.8rem; color: #888; }

        /* 思考经历样式 */
        .thought-item { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ccc; }
        .thought-item h4 { margin: 5px 0; color: #333; }
        
        .contact-link { display: block; margin-top: 10px; color: #000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="column-fixed">
        <h1>SUN BOYA</h1>
        <p>PROFILE</p>
        <p>这里写你的简短介绍。支持中英法三语。你可以介绍你的学术背景和创作初心。</p>
        <a href="mailto:contact@sunboya.fr" class="contact-link">CONTACT</a>
        <a href="https://instagram.com/your-id" class="contact-link">INSTAGRAM</a>
    </div>

    <div class="column-scroll">
        <h2>Projects / Articles</h2>
        
        <div class="article-card">
            <img src="https://via.placeholder.com/600x400" alt="文章配图">
            <div class="lang-tag">CN / EN / FR</div>
            <h3>文章题目示例</h3>
            <p>这里是文章的引文部分。你可以摘录一段最精彩的内容，吸引读者点击阅读全文...</p>
        </div>

        </div>

    <div class="column-scroll">
        <h2>Education & Thoughts</h2>
        
        <div class="thought-item">
            <small>2024 - 2026</small>
            <h4>工作经历/学习思考 A</h4>
            <p>在这里记录你关于这段经历的成长总结和深度思考。</p>
        </div>

        <div class="thought-item">
            <small>2023</small>
            <h4>关于三语写作的挑战</h4>
            <p>记录你在翻译和创作过程中的心得体会。</p>
        </div>
    </div>
</div>

</body>
</html>
